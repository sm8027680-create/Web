<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Do You Love Me? ❤️</title>
<style>
body{
    margin:0;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#ff9a9e,#fad0c4);
    font-family:Arial,sans-serif;
    overflow:hidden;
}
.container{
    text-align:center;
}
h1{
    color:white;
    font-size:48px;
    text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
}
button{
    padding:15px 35px;
    font-size:20px;
    border:none;
    border-radius:25px;
    cursor:pointer;
    margin:15px;
    font-weight:bold;
    transition:all 0.3s ease;
}
#yes{
    background:#4CAF50;
    color:white;
}
#yes:hover{
    background:#45a049;
    transform:scale(1.1);
}
#no{
    background:#f44336;
    color:white;
    position:absolute;
}
#no:hover{
    background:#da190b;
}
#result{
    display:none;
    text-align:center;
    animation: fadeIn 0.5s ease-in;
}
@keyframes fadeIn {
    from { opacity: 0; }
    to { opacity: 1; }
}
@keyframes pulse {
    0%, 100% { transform: scale(1); }
    50% { transform: scale(1.2); }
}
.hug{
    font-size:150px;
    animation: pulse 1s infinite;
}
p{
    color:white;
    font-size:24px;
    text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
}
</style>
</head>
<body>

<div class="container" id="question">
    <h1>Do You Love Me? ❤️</h1>
    <button id="yes">Yes 💖</button>
    <button id="no">No 😢</button>
</div>

<div id="result">
    <h1>Loading...</h1>
</div>

<script>
const noBtn = document.getElementById("no");
const yesBtn = document.getElementById("yes");
const questionDiv = document.getElementById("question");
const resultDiv = document.getElementById("result");

function moveButton(){
    const x = Math.random() * (window.innerWidth - 150);
    const y = Math.random() * (window.innerHeight - 100);
    noBtn.style.left = x + "px";
    noBtn.style.top = y + "px";
}

noBtn.addEventListener("mouseover", moveButton);
noBtn.addEventListener("click", moveButton);

yesBtn.addEventListener("click", function(){
    questionDiv.style.display = "none";
    resultDiv.style.display = "block";
    
    resultDiv.innerHTML = `
        <h1>I Love You Too 💗</h1>
        <p>Loading Virtual Hug... 🤗</p>
        <div class="hug">🧑‍🤝‍🧑</div>
    `;
    
    setTimeout(function(){
        resultDiv.innerHTML = `
            <h1>I Love You Too 💗</h1>
            <div style="font-size:200px; animation: pulse 1s infinite;">🧑‍❤️‍🧑</div>
            <p>Virtual Hug Completed 🤗</p>
        `;
    }, 2000);
});
</script>

</body>
</html>
